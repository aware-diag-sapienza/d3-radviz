        function uploadMenu(lista) {

            // here we upload the menu for the dimensions list

            let selection_list = document.getElementById("select-dataset");
            document.getElementById("label-select-radviz-dim").style.display = "block"
            document.getElementById("label-select-radviz-classification").style.display = "block"
            let optionnull = document.createElement("option");
            let testo = ''
            optionnull.text = testo
            optionnull.id = "s-d-attr" + 0
            optionnull.value = ''
            selection_list.add(optionnull);
            lista.forEach(function(l, i) {

                let option = document.createElement("option");
                let testo = ''
                if (l.includes('(')) {
                    let start = l.indexOf('-') + 1
                    let end = l.indexOf('(') - 3
                    testo = l.substr(start, end);
                } else if (l.includes('-')) {
                    let start = l.indexOf('-') + 1
                    let end = l.indexOf('.') - 3
                    testo = l.substr(start, end);
                } else {
                    let end = l.indexOf('.')
                    testo = l.substr(0, end);
                }

                if (testo.includes('-')) {
                    testo = testo.replace('-', ' ');
                }
                if (testo.includes('_')) {
                    testo = testo.replace('_', ' ');
                }
                option.id = "s-d-attr" + (i + 1)
                option.text = LABEL_DATASET[l]
                option.value = l.substring(0, l.indexOf('.'))

                if (l == DATASET) {
                    option.selected = true;
                }

                selection_list.add(option);
            })

            $('#select-dataset').on('change', function() {
                console.log('VALORE SELEZIONATO', this.value);
                if (this.value != '') {
                    system.settings.initializeDB(this.value)
                    system.settings.selected_dataset_option = this.value

                    document.getElementById("u-d-attr0").selected = true
                    document.getElementById("label-radviz-dim").style.display = "none";
                    document.getElementById("label-upload-radviz-classification").style.display = "none";
                    d3.select("#ul-upload-menu").remove('*');
                    d3.select("#ul-classification-upload").remove('*');
                    console.log('HO CLICCATO IL DATASET')
                }
            });

            // here we upload the menu for the classification list
            system.settings.initializeDB();

        }

        let DATASET_NAME = ''
        let newDataset = function(loadfile, nameDataset) {
            d3_radviz = d3.radviz()

            d3.csv(loadfile).then(dataset => {
                DATASET_NAME = nameDataset
                dimensions_removed = []
                attr_removed = []

                if (DATASET_NAME.indexOf('(') > 0) {
                    name_attr = DATASET_NAME.substring(DATASET_NAME.indexOf('(') + 1, DATASET_NAME.indexOf(')'));
                    ORIGINAL_CLASSIFIED = true
                }

                d3_radviz.data(dataset, name_attr)
                if (d3_radviz.data().attributes.length != 0) {
                    name_attr = d3_radviz.data().attributes[0].id
                    d3_radviz.setColorClassification()
                    d3_radviz.setColorClassification(name_attr)
                    ORIGINAL_CLASSIFIED = true

                } else if (DATASET_NAME.indexOf('(') > 0) {
                    name_attr = DATASET_NAME.substring(DATASET_NAME.indexOf('(') + 1, DATASET_NAME.indexOf(')'));
                    d3_radviz.setColorClassification(name_attr);
                    ORIGINAL_CLASSIFIED = true

                } else {
                    ORIGINAL_CLASSIFIED = false
                }

                system.data.load("./data/" + nameDataset + ".csv", nameDataset);
                system.structure.initializeForce();
                system.structure.initializeRadar();
                system.structure.initializeForceAxes(d3_radviz.data().angles);
                system.structure.initializeRadarAxes(d3_radviz.data().angles);

                let prova = function(_) {
                    console.log("sono riuscita a collegere la functione", _)

                }
                let f_context_menu = function(_) {
                    system.structure.initializeForceAxes(_);
                    system.structure.initializeRadarAxes(_);
                    system.radar.changeRadar(_);
                }
                let f_click = function(a, b, c) {
                    system.radar.drawRadar(a, b, c);
                    system.structure.uploadProgressBar();

                }

                let f_drag_end = function(a) {
                    system.structure.initializeForceAxes(a);
                    system.structure.initializeRadarAxes(a);
                    system.radar.changeRadar(a);
                    system.structure.drawboxplot(d3_radviz.data().entries.map(d => d.errorE));

                }

                let f_mouse_over = function(a, b) {
                    system.spring.drawForce(a, b);

                    var div = d3.select(".tooltip")
                    div.transition()
                        .duration(200)
                        .style("opacity", .9)

                    .delay(500);
                    div.html("(" + b.x1.toFixed(2) + "," + b.x2.toFixed(2) + ")<br> EE: " + b.errorE.toFixed(2))
                        .style("left", (d3.event.pageX) + "px")
                        .style("top", (d3.event.pageY - 50) + "px")
                        .style("color", "white")
                        .style("background", "black")
                }

                let f_mouse_out = function() {
                    d3.selectAll(".lineforce").remove();
                    var div = d3.select(".tooltip")
                    div.transition()
                        .duration(50)
                        .style("opacity", 0);

                }
                d3_radviz.setFunctionClick(f_click)
                d3_radviz.setFunctionMouseOver(f_mouse_over)
                d3_radviz.setFunctionMouseOut(f_mouse_out)
                d3_radviz.setFunctionDragEnd(f_drag_end)
                d3_radviz.setFunctionContextMenu(f_context_menu)

                system.structure.legenda_cluster(Array.from(new Set(d3_radviz.data().attributes.filter(function(pilot) {
                    return pilot.id === name_attr
                }).map(d => d.values)[0])))
                const set = d3_radviz.data().dimensions.map(d => d.values)
                d3.select('#container').call(d3_radviz);
                system.structure.drawboxplot(d3_radviz.data().entries.map(d => d.errorE));
                system.structure.uploadProgressBar();

            })
        }

        /********  IMPORT PANEL  ********/

        class ImportPanel {
            constructor(div) {
                this.div = div;
                this.form = this.div.select("form").attr("action", this.formUrl);
                this.container = this.div.select("#import-container");
                this.div.on("click", () => this.closePopup());
                this.container.on("click", () => d3.event.stopPropagation());
                this.onRead_fn = null;
                $(this.form.node()).on("drag dragstart dragend dragover dragenter dragleave drop", (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                    })
                    .on("dragover dragenter", () => {
                        this.container.classed("is-dragover", true);
                    })
                    .on("dragleave dragend drop", () => {
                        this.container.classed("is-dragover", false);
                    })
                    .on("drop", (e) => {
                        $(this.form.node()).find('input[type="file"]').prop("files", e.originalEvent.dataTransfer.files);
                        this.__readFile();
                    });
                this.form.select("input").on("change", () => this.__readFile());
            }
            __openPopup() {
                this.div
                    .style("opacity", 0)
                    .style("display", "block")
                    .transition()
                    .style("opacity", 1);
                return this;
            }
            __closePopup() {
                this.div
                    .style("opacity", 1)
                    .transition()
                    .style("opacity", 0)
                    .style("display", "none");
                return this;
            }
            __readFile() {
                this.__closePopup();
                let file = new FormData($(this.form.node()).get(0)).get("file");
                var reader = new FileReader();
                reader.onload = ((f) => {
                    return (e) => {
                        let fileName = f.name;
                        let fileContent = e.target.result;
                        if (this.onRead_fn != null) this.onRead_fn(fileName, fileContent);
                    };
                })(file);
                reader.readAsText(file);
            }
            onRead(fn) {
                this.onRead_fn = fn;
                return this;
            }
        }

        /********  IMPORT PANEL END  ********/
